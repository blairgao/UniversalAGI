services:
  # Stateless FastAPI mesh-processing service
  - type: web
    name: stl-studio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4

  # Static frontend (React + Vite build served from Render's CDN)
  - type: web
    name: stl-studio
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API calls to the backend service so the app stays same-origin.
      # If the service name above changes (e.g. it was taken), update this URL.
      - type: rewrite
        source: /api/*
        destination: https://stl-studio-api.onrender.com/api/*
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
